# Render blueprint — deploy this repo as a free Web Service.
# Secrets (sync: false) are NOT stored here; paste them in the Render dashboard.
services:
  - type: web
    name: investment-research-agent
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: LLM_PROVIDER
        value: google
      - key: LLM_MODEL
        value: gemini-3.1-flash-lite
      - key: GOOGLE_API_KEY
        sync: false # set in the Render dashboard
      - key: TAVILY_API_KEY
        sync: false # set in the Render dashboard
